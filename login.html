<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MathRupiah Pro | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0a0a0f;
            --dark-card: rgba(18, 18, 30, 0.95);
            --dark-border: rgba(99, 102, 241, 0.2);
            --dark-input: #1e1e2e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #12121e 50%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4), transparent);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Glow orbs */
        .glow-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            transition: transform 0.3s ease-out;
        }

        .orb-1 {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent);
            top: -200px;
            left: -200px;
            animation: orbFloat1 15s ease-in-out infinite;
        }

        .orb-2 {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2), transparent);
            bottom: -200px;
            right: -200px;
            animation: orbFloat2 18s ease-in-out infinite;
        }

        .orb-3 {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, -50px) scale(1.2); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Login container */
        .login-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login card */
        .login-card {
            background: var(--dark-card);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--dark-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1) inset;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Header */
        .login-header {
            text-align: center;
            padding: 2.5rem 2rem 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(79, 70, 229, 0.05));
            border-bottom: 1px solid var(--dark-border);
        }

        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-radius: 2rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 15px 30px -8px var(--primary-glow);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% {
                box-shadow: 0 15px 30px -8px var(--primary-glow);
            }
            50% {
                box-shadow: 0 20px 40px -5px rgba(99, 102, 241, 0.6);
            }
        }

        .logo-wrapper i {
            font-size: 2.5rem;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .badge-admin {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #f87171;
            margin-top: 1rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Body */
        .login-body {
            padding: 2rem;
        }

        /* Input fields */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .input-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1rem;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .input-field input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--dark-input);
            border: 1.5px solid rgba(45, 45, 68, 0.8);
            border-radius: 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
            outline: none;
        }

        .input-field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: #25253a;
        }

        .input-field input:focus + .input-icon {
            color: var(--primary-light);
        }

        /* Toggle password */
        .toggle-pass {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            padding: 5px;
        }

        .toggle-pass:hover {
            color: var(--primary-light);
        }

        /* Login button */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 0.9rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -8px var(--primary-glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-loading .btn-text {
            display: none;
        }

        .btn-loading .spinner {
            display: inline-block;
        }

        .login-btn .spinner {
            display: none;
        }

        /* ========== ENHANCED TOAST STYLES ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            max-width: 380px;
        }

        @media (max-width: 550px) {
            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: calc(100% - 20px);
            }
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(16px);
            padding: 14px 18px;
            border-radius: 1rem;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            pointer-events: auto;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.hide {
            transform: translateX(120%);
            opacity: 0;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .toast-success .toast-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .toast-error .toast-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .toast-info .toast-icon {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
        }

        .toast-warning .toast-icon {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .toast-message {
            flex: 1;
            color: var(--text-primary);
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
            font-size: 0.85rem;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 0 0 0 0.5rem;
            animation: progressShrink 3s linear forwards;
        }

        .toast-success .toast-progress {
            background: linear-gradient(90deg, var(--success), #34d399);
        }

        .toast-error .toast-progress {
            background: linear-gradient(90deg, var(--danger), #f87171);
        }

        .toast-warning .toast-progress {
            background: linear-gradient(90deg, var(--warning), #fbbf24);
        }

        .toast-info .toast-progress {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        @keyframes progressShrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Footer */
        .login-footer {
            margin-top: 1.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--dark-border);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 550px) {
            .login-container {
                max-width: 100%;
            }
            
            .login-header {
                padding: 1.8rem 1.5rem 1.2rem;
            }
            
            .logo-wrapper {
                width: 65px;
                height: 65px;
            }
            
            .logo-wrapper i {
                font-size: 2rem;
            }
            
            .login-header h1 {
                font-size: 1.4rem;
            }
            
            .login-body {
                padding: 1.5rem;
            }
            
            .input-field input {
                padding: 0.8rem 1rem 0.8rem 2.6rem;
            }
        }

        /* Success state */
        .login-success {
            background: linear-gradient(135deg, var(--success), var(--success-dark)) !important;
        }
        
        /* Input error animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .input-error {
            animation: shake 0.3s ease;
            border-color: var(--danger) !important;
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="particles" id="particles"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <!-- Enhanced Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fas fa-chalkboard-user"></i>
                </div>
                <h1>MathRupiah Pro</h1>
                <p>Administrator Control Panel</p>
                <div class="badge-admin">
                    <i class="fas fa-shield-alt"></i> FIREBASE AUTHENTICATION
                </div>
            </div>
            
            <div class="login-body">
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-envelope"></i> EMAIL ADMIN
                    </label>
                    <div class="input-field">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="admin@mathrupiah.com" autocomplete="off">
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-lock"></i> PASSWORD
                    </label>
                    <div class="input-field">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="off">
                        <button type="button" class="toggle-pass" id="togglePassword">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                
                <button id="loginBtn" class="login-btn">
                    <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i> MASUK KE DASHBOARD</span>
                    <span class="spinner"></span>
                </button>
                
                <div class="login-footer">
                    <i class="fas fa-fire"></i>
                    <span>Powered by Firebase Auth • Secure Login</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "firebase/auth";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBCaLABpKTIQhPJcJKN8dXSrk_cCLtTmQE",
            authDomain: "math-rupiah.firebaseapp.com",
            projectId: "math-rupiah",
            storageBucket: "math-rupiah.firebasestorage.app",
            messagingSenderId: "146629665060",
            appId: "1:146629665060:web:4207c18f4739f7688a53b1"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Set persistence to LOCAL (stay logged in)
        setPersistence(auth, browserLocalPersistence);
        
        // DOM elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const togglePassBtn = document.getElementById('togglePassword');
        const toastContainer = document.getElementById('toastContainer');
        
        // ========== ENHANCED TOAST SYSTEM ==========
        function showToast(message, type = 'info', duration = 3000) {
            if (!toastContainer) return;
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let iconHtml = '';
            switch(type) {
                case 'success':
                    iconHtml = '<i class="fas fa-check-circle"></i>';
                    break;
                case 'error':
                    iconHtml = '<i class="fas fa-exclamation-circle"></i>';
                    break;
                case 'warning':
                    iconHtml = '<i class="fas fa-exclamation-triangle"></i>';
                    break;
                default:
                    iconHtml = '<i class="fas fa-info-circle"></i>';
            }
            
            toast.innerHTML = `
                <div class="toast-icon">${iconHtml}</div>
                <div class="toast-message">${escapeHtml(message)}</div>
                <div class="toast-progress"></div>
            `;
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Click to dismiss
            toast.addEventListener('click', () => {
                dismissToast(toast);
            });
            
            // Auto dismiss after duration
            const timeout = setTimeout(() => {
                dismissToast(toast);
            }, duration);
            
            // Store timeout to clear if dismissed early
            toast.dismissTimeout = timeout;
        }
        
        function dismissToast(toast) {
            if (toast.dismissTimeout) clearTimeout(toast.dismissTimeout);
            toast.classList.remove('show');
            toast.classList.add('hide');
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 300);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 10 + 8 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                particlesContainer.appendChild(particle);
            }
        }
        
        // Input error animation
        function animateInputError(inputElement) {
            inputElement.classList.add('input-error');
            setTimeout(() => {
                inputElement.classList.remove('input-error');
            }, 300);
        }
        
        // Toggle password visibility
        let isPasswordVisible = false;
        togglePassBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            togglePassBtn.innerHTML = isPasswordVisible ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
        
        // Login function with Firebase Auth
        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email) {
                showToast('Email tidak boleh kosong!', 'error');
                animateInputError(emailInput);
                emailInput.focus();
                return;
            }
            
            if (!password) {
                showToast('Password tidak boleh kosong!', 'error');
                animateInputError(passwordInput);
                passwordInput.focus();
                return;
            }
            
            // Show loading
            const btnTextSpan = loginBtn.querySelector('.btn-text');
            const spinnerSpan = loginBtn.querySelector('.spinner');
            
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            btnTextSpan.style.display = 'none';
            spinnerSpan.style.display = 'inline-block';
            
            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('✅ Login successful:', user.email);
                
                // Save admin info to localStorage
                localStorage.setItem('admin_auth', 'true');
                localStorage.setItem('admin_email', user.email);
                localStorage.setItem('admin_uid', user.uid);
                localStorage.setItem('admin_login_time', new Date().toISOString());
                
                // Show success toast
                showToast(`✅ Selamat datang, ${user.email}! Mengalihkan ke dashboard...`, 'success', 2000);
                
                // Success animation
                loginBtn.classList.remove('btn-loading');
                loginBtn.innerHTML = '<i class="fas fa-check-circle"></i> BERHASIL!';
                loginBtn.classList.add('login-success');
                
                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
                
            } catch (error) {
                console.error('❌ Login error:', error.code, error.message);
                
                // Reset button
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
                btnTextSpan.style.display = 'inline-flex';
                spinnerSpan.style.display = 'none';
                
                // Show appropriate error message with toast
                let errorMessage = 'Login gagal!';
                let errorType = 'error';
                
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = 'Format email tidak valid!';
                        animateInputError(emailInput);
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'Email tidak terdaftar!';
                        animateInputError(emailInput);
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Password salah! Periksa kembali password Anda.';
                        animateInputError(passwordInput);
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Terlalu banyak percobaan. Coba lagi nanti!';
                        errorType = 'warning';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Koneksi internet bermasalah! Periksa koneksi Anda.';
                        errorType = 'warning';
                        break;
                    default:
                        errorMessage = error.message || 'Login gagal, coba lagi!';
                }
                
                showToast(errorMessage, errorType, 4000);
                
                // Clear password field
                passwordInput.value = '';
                passwordInput.focus();
                
                // Shake animation for card
                const card = document.querySelector('.login-card');
                card.style.animation = 'shakeError 0.4s ease';
                setTimeout(() => {
                    card.style.animation = '';
                }, 400);
            }
        }
        
        // Check if user is already logged in
        function checkAuthState() {
            showToast('🔐 Memeriksa sesi login...', 'info', 2000);
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // User is signed in
                    console.log('✅ User already logged in:', user.email);
                    showToast(`👋 Selamat datang kembali, ${user.email}!`, 'success', 2000);
                    
                    // Save to localStorage
                    localStorage.setItem('admin_auth', 'true');
                    localStorage.setItem('admin_email', user.email);
                    localStorage.setItem('admin_uid', user.uid);
                    
                    // Auto redirect after 1.2 seconds
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1200);
                } else {
                    // User is signed out
                    console.log('❌ No user logged in');
                    // Clear any old localStorage
                    localStorage.removeItem('admin_auth');
                    localStorage.removeItem('admin_email');
                    localStorage.removeItem('admin_uid');
                }
            });
        }
        
        // Enter key support
        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        }
        
        emailInput.addEventListener('keypress', handleEnter);
        passwordInput.addEventListener('keypress', handleEnter);
        loginBtn.addEventListener('click', handleLogin);
        
        // Focus on email input
        emailInput.focus();
        
        // Create particles on load
        createParticles();
        
        // Check authentication state
        checkAuthState();
        
        // Mouse move effect for orbs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const orbs = document.querySelectorAll('.glow-orb');
            orbs.forEach((orb, idx) => {
                const moveX = (x - 0.5) * 30 * (idx + 0.5);
                const moveY = (y - 0.5) * 30 * (idx + 0.5);
                orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
        
        // Add shakeError animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shakeError {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
            .shake-error {
                animation: shakeError 0.4s ease;
            }
        `;
        document.head.appendChild(style);
        
        console.log('✨ Firebase Auth Login Page Ready with Enhanced Toast');
        console.log('📧 Use email registered in Firebase Authentication');
    </script>
</body>
</html>
